name: PyPI Demo — Build, Scan & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_NAME: pypi-catalog-api
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      # Route pip through Artifactory — all downloads tracked, Curation evaluated
      - name: Configure pip — Artifactory virtual repo
        run: |
          jf pip-config \
            --repo-resolve demo-pypi

      # Install deps via Artifactory — malicious/blocked packages stop here
      - name: Install dependencies via Artifactory
        run: |
          jf pip install -r requirements.txt \
            --build-name=${{ env.BUILD_NAME }} \
            --build-number=${{ env.BUILD_NUMBER }}

      # Publish build info so Xray can link CVEs to this build
      - name: Publish build info
        run: jf rt bp ${{ env.BUILD_NAME }} ${{ env.BUILD_NUMBER }}

      # Xray scan — CVE-2022-22817 (Pillow), CVE-2020-14343 (PyYAML) appear here
      # --fail=false: show violations in JFrog UI without breaking the pipeline
      - name: Xray scan — Python dependencies
        run: |
          jf build-scan \
            ${{ env.BUILD_NAME }} \
            ${{ env.BUILD_NUMBER }} \
            --fail=false
