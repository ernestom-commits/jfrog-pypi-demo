name: PyPI Demo — Build, Scan & Publish

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BUILD_NAME: pypi-catalog-api
  BUILD_NUMBER: ${{ github.run_number }}

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: ${{ vars.JF_URL }}
          JF_ACCESS_TOKEN: ${{ secrets.JF_ACCESS_TOKEN }}

      # Write Artifactory credentials into pip config (does NOT use Curation audit path)
      - name: Configure pip — Artifactory virtual repo
        run: jf pip-config --repo-resolve demo-pypi

      # pip install uses the configured Artifactory index URL with credentials injected
      # Curation evaluates packages at the remote proxy layer (not via audit API)
      - name: Install dependencies via Artifactory
        run: pip install -r requirements.txt

      # jf audit scans installed packages for CVEs
      # Finds: CVE-2023-25577 (Werkzeug), CVE-2023-32681 (requests), CVE-2023-43804 (urllib3)
      - name: Xray audit — Python dependencies
        run: |
          jf audit \
            --pip=true \
            --format=table \
            --fail=false
